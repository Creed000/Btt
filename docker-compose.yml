version: "3.9"

services:
  db:
    image: postgres:17
    container_name: btt_db
    restart: always
    environment:
      POSTGRES_DB: btt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: btt_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
